<section class="chart-card">
  <header class="chart-card__header">
    <div>
      <h3 class="chart-card__title">{{ title }}</h3>
      @if (subtitle) {
        <p class="chart-card__subtitle">{{ subtitle }}</p>
      }
    </div>
    <ng-content select="[chartActions]" />
  </header>
  <div class="chart-card__body">
    <ng-content />
  </div>
</section>
