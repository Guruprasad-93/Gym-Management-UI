<article class="kpi-card" [style.--accent]="accent">
  <div class="kpi-card__top">
    <div class="kpi-card__icon">
      <mat-icon>{{ icon }}</mat-icon>
    </div>
    @if (hint) {
      <span class="kpi-card__hint">{{ hint }}</span>
    }
  </div>
  <p class="kpi-card__label">{{ label }}</p>
  <p class="kpi-card__value">
    @if (isCurrency) {
      {{ value | currency }}
    } @else {
      {{ value }}
    }
  </p>
  <div class="kpi-card__spark" aria-hidden="true">
    <svg viewBox="0 0 120 32" preserveAspectRatio="none">
      <path [attr.d]="sparkPath" fill="none" [attr.stroke]="accent" stroke-width="2" stroke-linecap="round" />
      <path [attr.d]="sparkAreaPath" [attr.fill]="accent" opacity="0.12" />
    </svg>
  </div>
</article>
