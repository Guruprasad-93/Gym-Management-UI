<div class="notification-bell">
  <button class="header__icon-btn" type="button" aria-label="Notifications" (click)="toggle()">
    <mat-icon>notifications_none</mat-icon>
    @if (unreadCount() > 0) {
      <span class="badge">{{ unreadCount() }}</span>
    }
  </button>

  @if (open()) {
    <div class="panel">
      <div class="panel-header">
        <strong>Notifications</strong>
        @if (unreadCount() > 0) {
          <button type="button" class="mark-read" (click)="markAllRead()">Mark all read</button>
        }
      </div>

      @if (!hasItems()) {
        <p class="empty">No notifications yet.</p>
      } @else {
        <ul>
          @for (item of items(); track item.id) {
            <li [class.unread]="!item.isRead">
              <button type="button" class="item-btn" (click)="onNotificationClick(item)">
                <strong>{{ item.title }}</strong>
                <span>{{ item.message }}</span>
              </button>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
