<header class="header">
  <button class="header__menu" type="button" (click)="menuToggle.emit()" aria-label="Menu">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="header__search">
    <mat-icon>search</mat-icon>
    <input type="search" [placeholder]="searchPlaceholder" disabled [attr.aria-label]="searchPlaceholder" />
    <kbd>Ctrl + K</kbd>
  </div>

  <div class="header__actions">
    <button class="header__icon-btn" type="button" aria-label="Notifications">
      <mat-icon>notifications_none</mat-icon>
    </button>
    <button class="header__icon-btn" type="button" aria-label="Messages">
      <mat-icon>mail_outline</mat-icon>
    </button>

    <button class="header__profile" type="button" [matMenuTriggerFor]="userMenu">
      <span class="header__avatar">{{ (userName || 'U').charAt(0).toUpperCase() }}</span>
      <span class="header__profile-text">
        <strong>{{ userName || 'User' }}</strong>
        <small>{{ title }}</small>
      </span>
      <mat-icon>expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</header>
