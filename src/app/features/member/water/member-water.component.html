<div class="member-page">
  <header class="saas-page__header">
    <div>
      <h1 class="saas-page__title">Water Tracker</h1>
      <p class="saas-page__subtitle">{{ today() ? today()!.completionPercent + '% of daily goal reached' : 'Log your hydration' }}</p>
    </div>
  </header>

  @if (today()) {
    <section class="kpi-grid">
      <app-saas-kpi-card label="Consumed Today" [value]="today()!.consumedLitres + ' L'" icon="water_drop" accent="#06aed4" />
      <app-saas-kpi-card label="Daily Target" [value]="today()!.targetLitres + ' L'" icon="flag" accent="#2e90fa" />
      <app-saas-kpi-card label="Completion" [value]="today()!.completionPercent + '%'" icon="check_circle" accent="#12b76a" />
    </section>
  }

  <section class="panel-shell">
    <div class="panel-shell__head"><h2>Update Intake</h2><p>Set your target and consumed litres for today</p></div>
    <div class="panel-shell__body">
      <form [formGroup]="form" (ngSubmit)="save()" class="form-grid">
        <label class="form-field"><span>Target (L)</span><input type="number" step="0.1" formControlName="targetLitres" /></label>
        <label class="form-field"><span>Consumed (L)</span><input type="number" step="0.1" formControlName="consumedLitres" /></label>
        <div class="form-actions"><button class="btn-primary" type="submit">Save</button></div>
      </form>
    </div>
  </section>

  <section class="chart-section">
    <app-saas-chart-card title="Weekly Intake" subtitle="Consumed vs target over recent days">
      <canvas #chartRef></canvas>
    </app-saas-chart-card>
  </section>
</div>
