<div class="member-page">
  <header class="saas-page__header">
    <div>
      <h1 class="saas-page__title">Gym Branding</h1>
      <p class="saas-page__subtitle">Logo, theme colors, and receipt settings</p>
    </div>
    <div class="member-page__actions">
      <button class="btn-primary" type="button" (click)="save()" [disabled]="saving() || form.invalid">
        <mat-icon>save</mat-icon>
        {{ saving() ? 'Saving…' : 'Save Branding' }}
      </button>
    </div>
  </header>

  @if (loading()) {
    <div class="page-loading">
      <mat-spinner diameter="36" />
      <p>Loading branding settings…</p>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="save()" class="branding-layout">
      <section class="panel-shell">
        <div class="panel-shell__head">
          <h2>Gym Logo</h2>
          <p>Displayed on receipts and member-facing pages</p>
        </div>
        <div class="panel-shell__body">
          <app-profile-photo-manager
            title="Gym logo"
            [category]="logoCategory"
            [gymId]="gymId"
            [size]="160"
            [circle]="false"
            uploadLabel="Upload logo" />
        </div>
      </section>

      <section class="panel-shell">
        <div class="panel-shell__head">
          <h2>Theme Colors</h2>
          <p>Primary and secondary brand colors</p>
        </div>
        <div class="panel-shell__body">
          <div class="color-grid">
            <label class="color-field">
              <span>Primary color</span>
              <div class="color-field__input">
                <input type="color" formControlName="primaryColor" />
                <code>{{ form.value.primaryColor }}</code>
              </div>
            </label>
            <label class="color-field">
              <span>Secondary color</span>
              <div class="color-field__input">
                <input type="color" formControlName="secondaryColor" />
                <code>{{ form.value.secondaryColor }}</code>
              </div>
            </label>
          </div>
        </div>
      </section>

      <section class="panel-shell">
        <div class="panel-shell__head">
          <h2>Receipt &amp; Invoice</h2>
          <p>Custom text for printed documents</p>
        </div>
        <div class="panel-shell__body">
          <div class="form-grid">
            <label class="form-field form-field--wide">
              <span>Receipt header</span>
              <textarea formControlName="receiptHeaderText" rows="3" placeholder="Text shown at top of receipts"></textarea>
            </label>
            <label class="form-field form-field--wide">
              <span>Invoice footer</span>
              <textarea formControlName="invoiceFooterText" rows="3" placeholder="Text shown at bottom of invoices"></textarea>
            </label>
          </div>
        </div>
      </section>
    </form>
  }
</div>
